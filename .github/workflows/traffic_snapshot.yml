name: Bangalore Traffic Snapshot

on:
  workflow_dispatch:
    inputs:
      job_type:
        description: "Which job to run (snapshot or dedup)"
        default: "snapshot"
        type: choice
        options:
          - snapshot
          - dedup

concurrency:
  group: traffic-snapshot
  cancel-in-progress: false

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          version: latest
          enable-cache: true
          cache-dependency-glob: |
            **/uv.lock
            **/pyproject.toml

      - name: Daily deduplication
        id: dedup
        if: ${{ inputs.job_type == 'dedup' }}
        run: |
          dedup_output="$(uv run tools/fix_timestamps.py --apply)"
          echo "$dedup_output"
          removed="$(printf '%s\n' "$dedup_output" | awk -F: '/Rows removed/ {gsub(/[ ,]/, "", $2); print $2; exit}')"
          if [ -z "$removed" ]; then
            removed=0
          fi
          echo "removed=$removed" >> "$GITHUB_OUTPUT"

      - name: Run weather snapshot
        if: >-
          >-
          ${{
            inputs.job_type == 'snapshot'
            || inputs.job_type == ''
          }}
        run: uv run tools/weather.py --json

      - name: Run traffic snapshot and append to CSV
        id: snapshot
        if: >-
          ${{
            inputs.job_type == 'snapshot'
            || inputs.job_type == ''
          }}
        run: |
          export LC_ALL=en_US.UTF-8
          export LANG=en_US.UTF-8
          uv run tools/traffic_snapshot.py > /tmp/snapshot_output.txt
          head -n -1 /tmp/snapshot_output.txt >> data/csv-traffic-bangalore.csv
          message="$(tail -n 1 /tmp/snapshot_output.txt)"
          echo "$message"
          echo "message=$message" >> "$GITHUB_OUTPUT"

      - name: Compose commit message
        id: commit_message
        run: |
          if [ "${{ inputs.job_type }}" = "dedup" ]; then
            removed="${{ steps.dedup.outputs.removed }}"
            echo "message=$removed records removed" >> "$GITHUB_OUTPUT"
          else
            echo "message=${{ steps.snapshot.outputs.message }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@users.noreply.github.com"

          # Remove stale files from old workflow versions if present
          git rm --cached --ignore-unmatch weather.md weather_snapshot.csv || true
          rm -f weather.md weather_snapshot.csv

          # Stage outputs before pulling to avoid "unstaged changes" rebase error
          git add data/csv-traffic-bangalore.csv data/csv-weather-snapshot.csv || true

          if git diff --cached --quiet; then
            echo "No changes"
            exit 0
          fi

          git commit -m "${{ steps.commit_message.outputs.message }}"

          # Pull with rebase; for data CSV conflicts always keep ours (appended rows)
          git pull --rebase -X ours origin main || true
          git push origin HEAD:main || (git pull --rebase -X ours origin main && git push origin HEAD:main)