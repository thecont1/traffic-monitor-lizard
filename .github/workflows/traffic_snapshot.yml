name: Bangalore Traffic Snapshot
on:
  schedule:
    - cron: "10 * * * *"   # primary (HH:40 IST)
    - cron: "40 * * * *"   # backup  (HH:10 IST)
  workflow_dispatch: {}

concurrency:
  group: traffic-snapshot
  cancel-in-progress: false

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup uv
        id: setup-uv
        uses: astral-sh/setup-uv@v6
        with:
          version: latest
          enable-cache: true
          # Optional: tie cache to your lockfile
          cache-dependency-glob: |
            **/uv.lock
            **/pyproject.toml

      - name: Install dependencies (using uv)
        run: uv sync

      - name: Run traffic snapshot and append to CSV
        id: snapshot
        run: |
          export LC_ALL=en_US.UTF-8
          export LANG=en_US.UTF-8
          .venv/bin/python traffic_snapshot.py > /tmp/snapshot_output.txt
          head -n -1 /tmp/snapshot_output.txt >> csv-bangalore_traffic.csv
          message="$(tail -n 1 /tmp/snapshot_output.txt)"
          echo "$message"
          echo "message=$message" >> "$GITHUB_OUTPUT"

      - name: Deduplicate CSV and commit
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@users.noreply.github.com"
          tmpfile=$(mktemp)
          awk -F, '!seen[$1 FS $2 FS $3]++' csv-bangalore_traffic.csv > "$tmpfile" && mv "$tmpfile" csv-bangalore_traffic.csv
          git add csv-bangalore_traffic.csv || true
          git commit -m "${{ steps.snapshot.outputs.message }}" || echo "No changes"
          git pull --rebase origin main || true
          git push || (git pull --rebase origin main && git push) || true
