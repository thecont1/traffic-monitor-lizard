name: Bangalore Traffic Snapshot
on:
  schedule:
    - cron: "10 * * * *"   # UTC :10 (= IST :40)
    - cron: "40 * * * *"   # UTC :40 (= IST next-hour :10)
  workflow_dispatch: {}

concurrency:
  group: traffic-snapshot
  cancel-in-progress: false

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup uv
        id: setup-uv
        uses: astral-sh/setup-uv@v6
        with:
          version: latest
          enable-cache: true
          # Optional: tie cache to your lockfile
          cache-dependency-glob: |
            **/uv.lock
            **/pyproject.toml

      - name: Install dependencies (using uv)
        run: uv sync

      - name: Decide whether to run daily dedup window
        id: dedup_window
        run: |
          now_ist="$(TZ=Asia/Kolkata date +%H:%M)"
          hour_ist="$(TZ=Asia/Kolkata date +%H)"
          minute_ist="$(TZ=Asia/Kolkata date +%M)"
          should_run=false
          if { [ "$hour_ist" = "01" ] || [ "$hour_ist" = "13" ]; } && [ "$minute_ist" -ge 10 ] && [ "$minute_ist" -le 25 ]; then
            should_run=true
          fi
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            should_run=true
          fi
          echo "now_ist=$now_ist"
          echo "should_run=$should_run" >> "$GITHUB_OUTPUT"

      - name: Daily deduplication (cycle-aware)
        id: dedup
        if: steps.dedup_window.outputs.should_run == 'true'
        run: |
          dedup_output="$(.venv/bin/python fix_timestamps.py --apply)"
          echo "$dedup_output"
          removed="$(printf '%s\n' "$dedup_output" | awk -F: '/Rows removed/ {gsub(/[ ,]/, "", $2); print $2; exit}')"
          if [ -z "$removed" ]; then
            removed=0
          fi
          echo "removed=$removed" >> "$GITHUB_OUTPUT"

      - name: Run traffic snapshot and append to CSV
        id: snapshot
        run: |
          export LC_ALL=en_US.UTF-8
          export LANG=en_US.UTF-8
          .venv/bin/python traffic_snapshot.py > /tmp/snapshot_output.txt
          head -n -1 /tmp/snapshot_output.txt >> csv-bangalore_traffic.csv
          message="$(tail -n 1 /tmp/snapshot_output.txt)"
          echo "$message"
          echo "message=$message" >> "$GITHUB_OUTPUT"

      - name: Compose commit message
        id: commit_message
        run: |
          if [ "${{ steps.dedup_window.outputs.should_run }}" = "true" ]; then
            removed="${{ steps.dedup.outputs.removed }}"
            echo "message=$removed records removed" >> "$GITHUB_OUTPUT"
          else
            echo "message=${{ steps.snapshot.outputs.message }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@users.noreply.github.com"

          # Rebase first to reduce race-related commit/push failures.
          git pull --rebase origin main || true

          git add csv-bangalore_traffic.csv || true

          if git diff --cached --quiet; then
            echo "No changes"
            exit 0
          fi

          git commit -m "${{ steps.commit_message.outputs.message }}"
          git push origin HEAD:main || (git pull --rebase origin main && git push origin HEAD:main) || true
